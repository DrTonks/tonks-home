<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F0F2" />
    <meta name="description" content="Tonks 的个人主页" />
    <title>Tonks</title>
    <!-- 字体异步加载：不阻塞首屏渲染，到货后自动应用 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/font/geist-sans/style.css"
      media="print" onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/font/geist-mono/style.css"
      media="print" onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.1.0/index.css"
      media="print" onload="this.media='all'"
    />
    <!-- 中文字体：得意黑 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/smiley-sans@2.0.1/index.css"
      media="print" onload="this.media='all'"
    />
    <!-- Caveat 本地化 -->
    <link rel="preload" href="/fonts/caveat.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
